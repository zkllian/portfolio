[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npx --yes pnpm@10 install --frozen-lockfile"]

[phases.build]
cmds = [
  "PORT=3000 BASE_PATH=/ npx pnpm@10 --filter @workspace/barcode-gen run build",
  "npx pnpm@10 --filter @workspace/api-server run build"
]

[start]
cmd = "node ./artifacts/api-server/dist/index.mjs"
