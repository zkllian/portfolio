<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekstrak Data Paspor</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f6f8;
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
    color: #1a1a2e;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px #0001;
    padding: 24px;
    max-width: 480px;
    margin: 0 auto;
  }

  h1 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
  }

  /* Upload area */
  .upload-area {
    border: 2px dashed #ddd;
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: #fafafa;
    margin-bottom: 16px;
  }
  .upload-area:hover { border-color: #e8001d; background: #fff5f5; }
  .upload-area.has-image { border-color: #22c55e; background: #f0fdf4; }
  .upload-area img {
    max-width: 100%;
    max-height: 180px;
    border-radius: 8px;
    display: none;
    margin: 0 auto 12px;
  }
  .upload-area.has-image img { display: block; }
  .upload-icon { font-size: 36px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; color: #555; }
  .upload-text span { color: #e8001d; font-weight: 600; }
  input[type=file] { display: none; }

  /* Analyze button */
  .btn-analyze {
    width: 100%;
    background: #e8001d;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-analyze:hover:not(:disabled) { background: #c0001a; transform: translateY(-1px); }
  .btn-analyze:disabled { background: #ccc; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: #888;
    font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #eee;
    border-top-color: #e8001d;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result fields */
  .results { display: none; }
  .results-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 12px;
  }

  .field-item {
    background: #f8f9fb;
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .field-item .left { flex: 1; min-width: 0; }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 4px;
  }
  .field-value {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: #1a1a2e;
    word-break: break-all;
  }
  .field-value.empty { color: #ccc; font-style: italic; font-family: 'Sora', sans-serif; font-size: 13px; }

  .btn-copy {
    flex-shrink: 0;
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-copy:hover { border-color: #e8001d; color: #e8001d; }
  .btn-copy.copied { border-color: #22c55e; color: #22c55e; background: #f0fdf4; }

  /* Copy all */
  .btn-copy-all {
    width: 100%;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.15s;
  }
  .btn-copy-all:hover { background: #2d2d50; }

  /* Error */
  .error-box {
    display: none;
    background: #fff5f5;
    border: 1px solid #fca5a5;
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    color: #b91c1c;
    text-align: center;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1a1a2e;
    color: #fff;
    font-size: 13px;
    padding: 10px 22px;
    border-radius: 100px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 99;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="card">
  <h1>📋 Ekstrak Data Paspor</h1>
  <p class="sub">Upload foto paspor pelanggan → data langsung siap di-copy ke form Indosat</p>

  <!-- Upload -->
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <img id="previewImg" src="" alt="">
    <div id="uploadPlaceholder">
      <div class="upload-icon">🛂</div>
      <div class="upload-text">Tap untuk <span>pilih foto paspor</span><br><small style="color:#bbb;font-size:12px">atau drag & drop di sini</small></div>
    </div>
  </div>
  <input type="file" id="fileInput" accept="image/*" onchange="onFileChange(this)">

  <button class="btn-analyze" id="btnAnalyze" onclick="analyze()" disabled>
    🔍 Baca Paspor Sekarang
  </button>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    AI sedang membaca paspor...
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-title">Hasil — tinggal copy ↓</div>

    <div class="field-item">
      <div class="left">
        <div class="field-label">Nama Customer</div>
        <div class="field-value" id="v_nama">—</div>
      </div>
      <button class="btn-copy" onclick="copyField('v_nama', this)">Copy</button>
    </div>

    <div class="field-item">
      <div class="left">
        <div class="field-label">Nomor Passport</div>
        <div class="field-value" id="v_passport">—</div>
      </div>
      <button class="btn-copy" onclick="copyField('v_passport', this)">Copy</button>
    </div>

    <div class="field-item">
      <div class="left">
        <div class="field-label">Tanggal Lahir</div>
        <div class="field-value" id="v_dob">—</div>
      </div>
      <button class="btn-copy" onclick="copyField('v_dob', this)">Copy</button>
    </div>

    <div class="field-item">
      <div class="left">
        <div class="field-label">Kebangsaan</div>
        <div class="field-value" id="v_nationality">—</div>
      </div>
      <button class="btn-copy" onclick="copyField('v_nationality', this)">Copy</button>
    </div>

    <div class="field-item">
      <div class="left">
        <div class="field-label">Berlaku Hingga</div>
        <div class="field-value" id="v_expiry">—</div>
      </div>
      <button class="btn-copy" onclick="copyField('v_expiry', this)">Copy</button>
    </div>

    <button class="btn-copy-all" onclick="copyAll()">📋 Copy Semua Data</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let base64Data = '', mediaType = '';

function onFileChange(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const src = e.target.result;
    base64Data = src.split(',')[1];
    mediaType = src.match(/data:(image\/\w+);/)[1];

    document.getElementById('previewImg').src = src;
    document.getElementById('uploadArea').classList.add('has-image');
    document.getElementById('uploadPlaceholder').style.display = 'none';
    document.getElementById('btnAnalyze').disabled = false;
    document.getElementById('results').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// Drag & drop
const area = document.getElementById('uploadArea');
area.addEventListener('dragover', e => { e.preventDefault(); area.style.borderColor = '#e8001d'; });
area.addEventListener('dragleave', () => area.style.borderColor = '');
area.addEventListener('drop', e => {
  e.preventDefault();
  area.style.borderColor = '';
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) {
    const dt = new DataTransfer();
    dt.items.add(f);
    document.getElementById('fileInput').files = dt.files;
    onFileChange(document.getElementById('fileInput'));
  }
});

async function analyze() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('btnAnalyze').disabled = true;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 500,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } },
            { type: "text", text: `Ekstrak data dari foto paspor ini. Kembalikan HANYA JSON tanpa markdown:
{"nama":"nama lengkap","nomor_passport":"nomor paspor","tanggal_lahir":"DD/MM/YYYY","kebangsaan":"nama negara","berlaku_hingga":"DD/MM/YYYY"}
Jika tidak ditemukan isi "". Baca MRZ jika perlu.` }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.content.map(b => b.text || '').join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);

    setValue('v_nama', parsed.nama);
    setValue('v_passport', parsed.nomor_passport);
    setValue('v_dob', parsed.tanggal_lahir);
    setValue('v_nationality', parsed.kebangsaan);
    setValue('v_expiry', parsed.berlaku_hingga);

    document.getElementById('results').style.display = 'block';
  } catch(e) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠ Gagal membaca paspor. Pastikan foto jelas dan coba lagi.';
    box.style.display = 'block';
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('btnAnalyze').disabled = false;
}

function setValue(id, val) {
  const el = document.getElementById(id);
  if (val && val.trim()) {
    el.textContent = val;
    el.classList.remove('empty');
  } else {
    el.textContent = 'Tidak ditemukan';
    el.classList.add('empty');
  }
}

function copyField(id, btn) {
  const val = document.getElementById(id).textContent;
  if (!val || val === 'Tidak ditemukan') return;
  navigator.clipboard.writeText(val);
  btn.textContent = '✓ Copied';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
}

function copyAll() {
  const fields = [
    ['Nama', 'v_nama'],
    ['No. Passport', 'v_passport'],
    ['Tgl. Lahir', 'v_dob'],
    ['Kebangsaan', 'v_nationality'],
    ['Berlaku Hingga', 'v_expiry'],
  ];
  const text = fields.map(([label, id]) => `${label}: ${document.getElementById(id).textContent}`).join('\n');
  navigator.clipboard.writeText(text);
  showToast('✓ Semua data ter-copy!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
