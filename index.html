<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Generator Barcode</title>

<style>
@font-face{
font-family:'SF Pro Custom';
src:url('SF-Pro-Display-Regular.otf') format('opentype');
font-weight:400;
}

@font-face{
font-family:'SF Pro Custom';
src:url('SF-Pro-Display-Medium.otf') format('opentype');
font-weight:500;
}

body{
margin:0;
padding:30px 0 120px;
background:#f2f2f7;
font-family:'SF Pro Custom',-apple-system,BlinkMacSystemFont,sans-serif;
}

.app-wrap{
max-width:420px;
margin:0 auto;
padding:0 14px;
box-sizing:border-box;
}

.glass-shell{
padding:10px;
border-radius:22px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(30px);
box-shadow:0 8px 30px rgba(0,0,0,0.08);
margin-bottom:22px;
}

.window,.result-window{
width:100%;
background:white;
border-radius:16px;
border:1px solid rgba(0,0,0,0.08);
box-shadow:0 10px 35px rgba(0,0,0,0.06);
position:relative;
padding:54px 14px 20px;
box-sizing:border-box;
}

.window-header{
position:absolute;
top:0;
left:0;
right:0;
height:34px;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:500;
background:linear-gradient(#f9f9f9,#e9e9e9);
border-bottom:1px solid rgba(0,0,0,0.08);
border-top-left-radius:16px;
border-top-right-radius:16px;
}

.window-dots{
position:absolute;
left:12px;
display:flex;
gap:7px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}

.red{background:#ff5f57;}
.yellow{background:#ffbd2e;}
.green{background:#28c840;}

textarea{
width:100%;
height:170px;
padding:14px;
font-size:15px;
border-radius:12px;
border:1px solid #d2d2d7;
resize:none;
outline:none;
box-sizing:border-box;
font-family:'SF Pro Custom';
}

.btn{
width:100%;
padding:13px 0;
margin-top:14px;
font-size:15px;
border-radius:12px;
border:none;
font-weight:500;
cursor:pointer;
}

.generate{
background:linear-gradient(#4da3ff,#0a84ff);
color:white;
}

.generate:disabled{
opacity:.6;
}

.reset{
display:none;
}

.action-row{
display:flex;
gap:10px;
margin-top:14px;
}

.download-btn{
flex:1;
background:#e5e5ea;
}

.share-btn{
flex:1;
background:#34c759;
color:white;
}

.result-window img{
width:100%;
border-radius:12px;
display:block;
}
</style>
</head>

<body>

<div class="app-wrap">

<div class="glass-shell">
<div class="window">

<div class="window-header">

<div class="window-dots">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
</div>

Generator Barcode
</div>

<textarea id="bulkInput" placeholder="Satu IMEI (15 digit) per baris"></textarea>

<button id="generateBtn" class="btn generate" onclick="generateBulk()">Generate</button>
<button id="resetBtn" class="btn reset" onclick="resetAll()">Reset</button>

</div>
</div>

<div id="results"></div>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

const baseImage=new Image();
baseImage.src="template.png";

const canvas=document.getElementById("canvas");
const input=document.getElementById("bulkInput");
const resetBtn=document.getElementById("resetBtn");
const resultsDiv=document.getElementById("results");
const generateBtn=document.getElementById("generateBtn");

baseImage.onload=()=>{
canvas.width=baseImage.width;
canvas.height=baseImage.height;
};

input.addEventListener("input",()=>{
input.value=input.value.replace(/[^0-9\n]/g,'');
});

function setLoading(state,text){
generateBtn.disabled=state;
generateBtn.textContent=text||"Generate";
}

function resetAll(){
input.value="";
resultsDiv.innerHTML="";
resetBtn.style.display="none";
}

function randomDigits(len){
return Array.from({length:len},()=>Math.floor(Math.random()*10)).join('');
}

function downloadImage(dataUrl,index){
const a=document.createElement("a");
a.href=dataUrl;
a.download=`barcode-${index}.png`;
a.click();
}

async function shareImage(dataUrl,index){

if(!navigator.share){
return alert("Browser tidak mendukung share");
}

const res=await fetch(dataUrl);
const blob=await res.blob();

const file=new File([blob],"barcode.png",{type:"image/png"});

if(navigator.canShare && navigator.canShare({files:[file]})){
await navigator.share({
files:[file]
});
}

}

async function generateBulk(){

const lines=input.value.split("\n").map(v=>v.trim()).filter(Boolean);

if(lines.length<2){
alert("Minimal 2 IMEI diperlukan");
return;
}

let kurang=lines.filter(v=>v.length<15);
let lebih=lines.filter(v=>v.length>15);

if(kurang.length||lebih.length){

let pesan="";

if(kurang.length){
pesan+="IMEI kurang dari 15 digit:\n"+kurang.join("\n")+"\n\n";
}

if(lebih.length){
pesan+="IMEI lebih dari 15 digit:\n"+lebih.join("\n");
}

alert(pesan.trim());
return;
}

const totalPairs=Math.floor(lines.length/2);

const ctx=canvas.getContext("2d");

ctx.fillStyle="#000";
ctx.textBaseline="top";
ctx.font="400 31px 'SF Pro Custom'";

resultsDiv.innerHTML="";
resetBtn.style.display="none";

for(let i=0;i<totalPairs;i++){

setLoading(true,`Generating ${i+1}/${totalPairs}`);

await new Promise(r=>setTimeout(r,30));

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(baseImage,0,0);

ctx.setTransform(0.97,0,0,1,0,0);

ctx.fillText(randomDigits(32),117,377.8);
ctx.fillText(lines[i*2],288,669.5);
ctx.fillText(lines[i*2+1],288,954.5);
ctx.fillText(randomDigits(14),297,1244.5);

ctx.setTransform(1,0,0,1,0,0);

const url=canvas.toDataURL("image/png");

const shell=document.createElement("div");
shell.className="glass-shell";

const div=document.createElement("div");
div.className="result-window";

div.innerHTML=`
<div class="window-header">
<div class="window-dots">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
</div>
Barcode #${i+1}
</div>

<img src="${url}">

<div class="action-row">
<button class="btn download-btn" onclick="downloadImage('${url}',${i+1})">Download</button>
<button class="btn share-btn" onclick="shareImage('${url}',${i+1})">Share</button>
</div>
`;

shell.appendChild(div);
resultsDiv.appendChild(shell);

}

setLoading(false,"Generate");

resetBtn.style.display="block";

}

</script>

</body>
</html>
