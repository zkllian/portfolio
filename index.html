<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Generator Barcode</title>

<style>
@font-face {
  font-family: 'SF Pro Custom';
  src: url('SF-Pro-Display-Regular.otf') format('opentype');
  font-weight: 400;
}
@font-face {
  font-family: 'SF Pro Custom';
  src: url('SF-Pro-Display-Medium.otf') format('opentype');
  font-weight: 500;
}

body{
  margin:0;
  padding:30px 0 120px;
  background:#f2f2f7;
  font-family:'SF Pro Custom', -apple-system, BlinkMacSystemFont, sans-serif;
}

.app-wrap{ max-width:420px; margin:0 auto; padding:0 14px; box-sizing:border-box; }

/* ===== MAIN INPUT WINDOW ===== */
.glass-shell{
  padding:10px;
  border-radius:22px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(30px) saturate(160%);
  -webkit-backdrop-filter:blur(30px) saturate(160%);
  box-shadow:0 8px 30px rgba(0,0,0,0.08), inset 0 1px 1px rgba(255,255,255,0.7);
  margin-bottom:28px;
}

.window{
  position:relative;
  width:100%;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(30px);
  border-radius:18px;
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:0 18px 40px rgba(0,0,0,0.08);
  padding:54px 14px 20px;
  box-sizing:border-box;
}

/* ===== STACKED RESULT CARD ===== */
.stack-card{
  position:relative;
  margin-bottom:28px;
  perspective:1000px;
}

.stack-layer{
  position:absolute;
  left:0; right:0;
  height:100%;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(20px);
  border:1px solid rgba(0,0,0,0.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  z-index:0;
  transition:.5s ease;
}

.layer1{ top:10px; transform:scale(.97); opacity:.6; }
.layer2{ top:20px; transform:scale(.94); opacity:.35; }

.result-window{
  position:relative;
  z-index:2;
  width:100%;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(30px);
  border-radius:20px;
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:0 25px 50px rgba(0,0,0,0.12);
  padding:54px 14px 20px;
  box-sizing:border-box;
  opacity:0;
  transform:translateY(40px) scale(.96) rotateX(8deg);
}

.result-window.show{
  animation:cardIn .7s cubic-bezier(.2,.8,.2,1) forwards;
}

@keyframes cardIn{
  to{ opacity:1; transform:translateY(0) scale(1) rotateX(0); }
}

/* HEADER */
.window-header{
  position:absolute;
  top:0; left:0; right:0;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:500;
  background:linear-gradient(to bottom,#f9f9f9,#e9e9e9);
  border-bottom:1px solid rgba(0,0,0,0.08);
  border-top-left-radius:18px;
  border-top-right-radius:18px;
  color:#3c3c43;
}

.window-dots{ position:absolute; left:12px; display:flex; gap:7px; }
.dot{ width:12px; height:12px; border-radius:50%; }
.red{ background:#ff5f57; }
.yellow{ background:#ffbd2e; }
.green{ background:#28c840; }

textarea{
  width:100%; height:170px; padding:14px; font-size:15px;
  border-radius:12px; border:1px solid #d2d2d7;
  resize:none; outline:none; box-sizing:border-box;
  font-family:'SF Pro Custom';
}

.btn{
  width:100%; padding:13px 0; margin-top:14px;
  font-size:15px; border-radius:12px; border:none;
  font-weight:500; cursor:pointer;
  font-family:'SF Pro Custom';
}

.generate{ background:linear-gradient(#4da3ff,#0a84ff); color:white; box-shadow:0 6px 14px rgba(10,132,255,.25); }
.generate:disabled{ opacity:.6; box-shadow:none; }

.reset{ display:none; }

.action-row{ display:flex; gap:10px; margin-top:14px; }
.download-btn{ flex:1; background:#e5e5ea; }
.share-btn{ flex:1; background:#34c759; color:white; }

.result-window img{ width:100%; border-radius:12px; display:block; }
</style>
</head>

<body>

<div class="app-wrap">
  <div class="glass-shell">
    <div class="window">
      <div class="window-header">
        <div class="window-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        Generator Barcode
      </div>

      <textarea id="bulkInput" inputmode="numeric" placeholder="Satu IMEI (15 digit) per baris"></textarea>
      <button id="generateBtn" class="btn generate" onclick="generateBulk()">Generate</button>
      <button id="resetBtn" class="btn reset" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const baseImage=new Image();
baseImage.src="template.png";

const canvas=document.getElementById("canvas");
const input=document.getElementById("bulkInput");
const resetBtn=document.getElementById("resetBtn");
const resultsDiv=document.getElementById("results");
const generateBtn=document.getElementById("generateBtn");

baseImage.onload=()=>{ canvas.width=baseImage.width; canvas.height=baseImage.height; };
input.addEventListener("input",()=>{ input.value=input.value.replace(/[^0-9\n]/g,''); });

function setLoading(state,text){
  generateBtn.disabled=state;
  generateBtn.textContent=text || "Generate";
}

function resetAll(){ input.value=""; resultsDiv.innerHTML=""; resetBtn.style.display="none"; }

function randomDigits(len){ return Array.from({length:len},()=>Math.floor(Math.random()*10)).join(''); }

function downloadImage(dataUrl,index){
  const a=document.createElement("a");
  a.href=dataUrl;
  a.download=`barcode-${index}.png`;
  a.click();
}

async function shareImage(dataUrl,index){
  if(!navigator.share) return alert("Browser tidak mendukung fitur share");
  const res=await fetch(dataUrl);
  const blob=await res.blob();
  const file=new File([blob],`barcode-${index}.png`,{type:"image/png"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({files:[file],title:`Barcode ${index}`});
  }
}

async function generateBulk(){
  const lines=input.value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(lines.length<2) return alert("Minimal 2 IMEI diperlukan");

  const totalPairs=Math.floor(lines.length/2);
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#000";
  ctx.textBaseline="top";
  ctx.font="400 31px 'SF Pro Custom'";

  resultsDiv.innerHTML="";
  resetBtn.style.display="none";

  for(let i=0;i<totalPairs;i++){
    setLoading(true,`Generating ${i+1}/${totalPairs}`);
    await new Promise(r=>setTimeout(r,30));

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(baseImage,0,0);
    ctx.setTransform(0.97,0,0,1,0,0);

    ctx.fillText(randomDigits(32),117,377.8);
    ctx.fillText(lines[i*2],288,669.5);
    ctx.fillText(lines[i*2+1],288,954.5);
    ctx.fillText(randomDigits(14),297,1244.5);
    ctx.setTransform(1,0,0,1,0,0);

    const url=canvas.toDataURL("image/png");

    const stack=document.createElement("div");
    stack.className="stack-card";
    stack.innerHTML=`<div class="stack-layer layer1"></div><div class="stack-layer layer2"></div>`;

    const card=document.createElement("div");
    card.className="result-window";
    card.innerHTML=`
      <div class="window-header">
        <div class="window-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        Barcode #${i+1}
      </div>
      <img src="${url}">
      <div class="action-row">
        <button class="btn download-btn" onclick="downloadImage('${url}', ${i+1})">Download</button>
        <button class="btn share-btn" onclick="shareImage('${url}', ${i+1})">Share</button>
      </div>
    `;

    stack.appendChild(card);
    resultsDiv.appendChild(stack);
    requestAnimationFrame(()=>card.classList.add("show"));
  }

  setLoading(false,"Generate");
  resetBtn.style.display="block";
}
</script>

</body>
</html>
