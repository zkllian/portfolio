<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Generator Barcode</title>

<style>
@font-face {
  font-family: 'sf pro custom';
  src: url('SF-Pro-Display-Regular.otf') format('opentype');
  font-weight: 400;
}
@font-face {
  font-family: 'sf pro custom';
  src: url('SF-Pro-Display-Medium.otf') format('opentype');
  font-weight: 500;
}

body {
  margin: 0;
  padding: 30px 0 120px;
  background: #ececec;
  font-family: 'sf pro custom', -apple-system, BlinkMacSystemFont, sans-serif;
}

.app-wrap{
  max-width: 420px;
  margin: 0 auto;
  padding: 0 14px;
}

.window {
  width: 100%;
  margin-bottom: 22px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(30px);
  border-radius: 14px;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  position: relative;
  padding: 54px 14px 20px;
}

.window-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  font-family: 'sf pro custom';
  background: linear-gradient(to bottom,#f9f9f9,#e9e9e9);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  border-top-left-radius: 14px;
  border-top-right-radius: 14px;
  color: #3c3c43;
}

.window-dots {
  position: absolute;
  left: 12px;
  display: flex;
  gap: 7px;
}
.dot { width: 12px; height: 12px; border-radius: 50%; }
.red { background:#ff5f57; }
.yellow { background:#ffbd2e; }
.green { background:#28c840; }

/* TEXTAREA WITH LINE NUMBERS */
.editor-wrap{
  display:flex;
  border: 1px solid #d2d2d7;
  border-radius: 10px;
  overflow:hidden;
  background:#fff;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
}

.line-numbers{
  background: #f5f5f7;
  color: #8e8e93;
  padding: 14px 6px;
  text-align: right;
  user-select: none;
  font-size: 14px;
  line-height: 22px;
  border-right: 1px solid #e0e0e0;
  min-width: 38px;
  box-sizing: border-box;
}

textarea{
  flex:1;
  height:170px;
  padding:14px;
  font-size:15px;
  border:none;
  outline:none;
  resize:none;
  font-family:'sf pro custom';
  line-height:22px;
}

.btn {
  width: 100%;
  padding: 12px 0;
  margin-top: 14px;
  font-size: 14px;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,0.15);
  font-weight: 500;
  font-family: 'sf pro custom';
  cursor: pointer;
  background: linear-gradient(#fdfdfd,#e5e5ea);
}

.generate {
  background: linear-gradient(#4da3ff,#0a84ff);
  border: 1px solid #0a84ff;
  color: white;
}

.result-window {
  width: 100%;
  margin-bottom: 22px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(30px);
  border-radius: 14px;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  position: relative;
  padding: 54px 14px 20px;
}

.result-window img {
  width:100%;
  border-radius:10px;
  display:block;
}
</style>
</head>

<body>
<div class="app-wrap">

  <div class="window">
    <div class="window-header">
      <div class="window-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      Generator Barcode
    </div>

    <div class="editor-wrap">
      <div class="line-numbers" id="lineNumbers">1</div>
      <textarea id="bulkInput" inputmode="numeric"></textarea>
    </div>

    <button class="btn generate" onclick="generateBulk()">Generate</button>
  </div>

  <div id="results"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const baseImage = new Image();
baseImage.src = "template.png";

const canvas = document.getElementById("canvas");
const input = document.getElementById("bulkInput");
const lineNumbers = document.getElementById("lineNumbers");
const resultsDiv = document.getElementById("results");

let imageReady = false;

baseImage.onload = () => {
  canvas.width = baseImage.width;
  canvas.height = baseImage.height;
  imageReady = true;
};

/* INPUT FILTER */
input.addEventListener("input", () => {
  input.value = input.value.replace(/[^0-9\n]/g,'');
  updateLineNumbers();
});

/* LINE NUMBER SYNC */
function updateLineNumbers(){
  const lines = input.value.split("\n").length;
  let html="";
  for(let i=1;i<=lines;i++) html+=i+"<br>";
  lineNumbers.innerHTML=html;
  syncLineNumberHeight();
}

function syncLineNumberHeight(){
  lineNumbers.style.height = input.clientHeight + "px";
}

input.addEventListener("scroll", () => {
  lineNumbers.scrollTop = input.scrollTop;
});

window.addEventListener("resize", syncLineNumberHeight);
updateLineNumbers();

/* RANDOM DIGITS */
function randomDigits(len){
  return Array.from({length:len},()=>Math.floor(Math.random()*10)).join('');
}

/* GENERATE */
function generateBulk(){
  if(!imageReady) return alert("Template belum dimuat");

  resultsDiv.innerHTML="";
  const lines=input.value.split("\n").map(l=>l.trim()).filter(Boolean);

  if(lines.length < 2) return alert("Minimal 2 IMEI diperlukan");

  let invalid=[];
  for(let i=0;i<lines.length;i++){
    if(lines[i].length < 15) invalid.push(i+1);
  }
  if(invalid.length){
    alert("Baris " + invalid.join(", ") + " kurang dari 15 digit");
    return;
  }

  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#000";
  ctx.textBaseline="top";
  ctx.font="500 31px 'sf pro custom'";

  let count=0;

  for(let i=0;i<lines.length;i+=2){
    if(!lines[i+1]) break;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(baseImage,0,0);
    ctx.setTransform(0.97,0,0,1,0,0);

    ctx.fillText(randomDigits(32),117,377.8);
    ctx.fillText(lines[i],288,669.5);
    ctx.fillText(lines[i+1],288,954.5);
    ctx.fillText(randomDigits(14),297,1244.5);

    ctx.setTransform(1,0,0,1,0,0);

    const url=canvas.toDataURL("image/png");

    const div=document.createElement("div");
    div.className="result-window";
    div.innerHTML=`
      <div class="window-header">
        <div class="window-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        Barcode #${++count}
      </div>
      <img src="${url}">
    `;
    resultsDiv.appendChild(div);
  }
}
</script>

</body>
  </html>
