body {

  padding: 24px 16px 60px;
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}

.card {
  max-width: 420px;
  margin: 0 auto 18px;
  background: #fff;
  border-radius: 28px;
  padding: 22px 18px 26px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  text-align: center;
}

h2 { margin: 6px 0 18px; }

textarea {
  width: 100%;
  height: 170px;
  padding: 16px;
  font-size: 17px;
  border-radius: 18px;
  border: 1px solid #d1d1d6;
  box-sizing: border-box;
  resize: none;
  outline: none;
  background: #fff;
  font-family: 'SF Pro Display', sans-serif;
}

.btn-blue {
  width: 100%;
  padding: 14px 0;
  font-size: 17px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(180deg, #0a84ff, #0066ff);
  color: white;
  font-weight: 600;
  font-family: 'SF Pro Display', sans-serif;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0,122,255,0.35);
  transition: transform 0.1s ease;
}

.btn-blue:active { transform: scale(0.98); }

button.generate { margin-top: 18px; }

#downloadAllBtn {
  display: none;
  margin-top: 12px;
}

#statusCard {
  display: none;
  font-size: 16px;
  font-weight: 600;
  color: #34c759;
}

.loader {
  margin: 16px auto 0;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 4px solid #e5e5ea;
  border-top: 4px solid #0a84ff;
  animation: spin 0.8s linear infinite;
  display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }

#results { max-width: 420px; margin: 0 auto; }

.result-card {
  background: #fff;
  border-radius: 22px;
  padding: 14px;
  margin-bottom: 26px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

.result-card img {
  width: 100%;
  border-radius: 14px;
  display: block;
}
</style>
