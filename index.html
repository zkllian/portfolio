<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Generator Barcode</title>

<style>
@font-face {
  font-family: 'sf pro custom';
  src: url('SF-Pro-Display-Regular.otf') format('opentype');
  font-weight: 400;
}
@font-face {
  font-family: 'sf pro custom';
  src: url('SF-Pro-Display-Medium.otf') format('opentype');
  font-weight: 500;
}

body {
  margin: 0;
  padding: 30px 0 120px;
  background: #ececec;
  font-family: 'sf pro custom', -apple-system, BlinkMacSystemFont, sans-serif;
}

.app-wrap{
  max-width: 420px;
  margin: 0 auto;
  padding: 0 14px;
  box-sizing: border-box;
}

.window {
  width: 100%;
  margin-bottom: 22px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(30px);
  border-radius: 14px;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  position: relative;
  padding: 54px 14px 20px;
  box-sizing: border-box;
}

.window-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  background: linear-gradient(to bottom,#f9f9f9,#e9e9e9);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  border-top-left-radius: 14px;
  border-top-right-radius: 14px;
  color: #3c3c43;
}

.window-dots {
  position: absolute;
  left: 12px;
  display: flex;
  gap: 7px;
}
.dot { width: 12px; height: 12px; border-radius: 50%; }
.red { background:#ff5f57; }
.yellow { background:#ffbd2e; }
.green { background:#28c840; }

textarea {
  width: 100%;
  height: 170px;
  padding: 14px;
  font-size: 15px;
  border-radius: 10px;
  border: 1px solid #d2d2d7;
  background: #ffffff;
  resize: none;
  outline: none;
  box-sizing: border-box;
  font-family: 'sf pro custom';
  line-height: 22px;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
}

.btn {
  width: 100%;
  padding: 12px 0;
  margin-top: 14px;
  font-size: 14px;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,0.15);
  font-weight: 500;
  cursor: pointer;
  background: linear-gradient(#fdfdfd,#e5e5ea);
}

.generate {
  background: linear-gradient(#4da3ff,#0a84ff);
  border: 1px solid #0a84ff;
  color: white;
}

.reset { display:none; }

.result-window {
  width: 100%;
  margin-bottom: 22px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(30px);
  border-radius: 14px;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  position: relative;
  padding: 54px 14px 20px;
  box-sizing: border-box;
}

.result-window img {
  width:100%;
  border-radius:10px;
  display:block;
}
</style>
</head>

<body>

<div class="app-wrap">
  <div class="window">
    <div class="window-header">
      <div class="window-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      Generator Barcode
    </div>

    <textarea id="bulkInput" inputmode="numeric" placeholder="Satu IMEI (15 digit) per baris"></textarea>

    <button class="btn generate" onclick="generateBulk()">Generate</button>
    <button id="resetBtn" class="btn reset" onclick="resetAll()">Reset</button>
  </div>

  <div id="results"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const baseImage = new Image();
baseImage.src = "template.png";

const canvas = document.getElementById("canvas");
const input = document.getElementById("bulkInput");
const resetBtn = document.getElementById("resetBtn");
const resultsDiv = document.getElementById("results");

baseImage.onload = () => {
  canvas.width = baseImage.width;
  canvas.height = baseImage.height;
};

/* ONLY NUMBERS */
input.addEventListener("input", () => {
  input.value = input.value.replace(/[^0-9\n]/g,'');
});

function resetAll(){
  input.value="";
  resultsDiv.innerHTML="";
  resetBtn.style.display="none";
}

function randomDigits(len){
  return Array.from({length:len},()=>Math.floor(Math.random()*10)).join('');
}

function generateBulk(){
  const lines=input.value.split("\n").map(l=>l.trim()).filter(Boolean);

  if(lines.length < 2) return alert("Minimal 2 IMEI diperlukan");

  /* STRICT 15 DIGIT VALIDATION */
  let invalidImeis = lines.filter(v => v.length !== 15);
  if(invalidImeis.length){
    alert("Semua IMEI harus tepat 15 digit.\nIMEI tidak valid:\n" + invalidImeis.join("\n"));
    return;
  }

  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#000";
  ctx.textBaseline="top";
  ctx.font="500 31px 'sf pro custom'";

  resultsDiv.innerHTML="";
  let count=0;

  for(let i=0;i<lines.length;i+=2){
    if(!lines[i+1]) break;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(baseImage,0,0);
    ctx.setTransform(0.97,0,0,1,0,0);

    ctx.fillText(randomDigits(32),117,377.8);
    ctx.fillText(lines[i],288,669.5);
    ctx.fillText(lines[i+1],288,954.5);
    ctx.fillText(randomDigits(14),297,1244.5);

    ctx.setTransform(1,0,0,1,0,0);

    const url=canvas.toDataURL("image/png");

    const div=document.createElement("div");
    div.className="result-window";
    div.innerHTML=`
      <div class="window-header">
        <div class="window-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        Barcode #${count+1}
      </div>
      <img src="${url}">
    `;
    resultsDiv.appendChild(div);
    count++;
  }

  resetBtn.style.display="block";
}
</script>

</body>
</html>
