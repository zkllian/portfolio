<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zklln IMEI Maker</title>

<style>
@font-face {
  font-family: 'SF Pro Display';
  src: url('SF-Pro-Display-Medium.otf') format('opentype');
  font-weight: 500;
}

body {
  margin: 0;
  padding: 24px 16px 60px;
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}

.card {
  max-width: 420px;
  margin: 0 auto 18px;
  background: #fff;
  border-radius: 28px;
  padding: 22px 18px 26px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  text-align: center;
}

h2 { margin: 6px 0 18px; }

textarea {
  width: 100%;
  height: 170px;
  padding: 16px;
  font-size: 17px;
  border-radius: 18px;
  border: 1px solid #d1d1d6;
  box-sizing: border-box;
  resize: none;
  outline: none;
  background: #fff;
  font-family: 'SF Pro Display', sans-serif;
}

button.generate {
  margin-top: 18px;
  width: 100%;
  padding: 14px 0;
  font-size: 17px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(180deg, #0a84ff, #0066ff);
  color: white;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0,122,255,0.35);
}

button.generate:active { transform: scale(0.98); }

#statusCard {
  display: none;
  font-size: 16px;
  font-weight: 600;
  color: #34c759;
}

.download-all-btn {
  margin-top: 12px;
  width: 100%;
  padding: 12px 0;
  border-radius: 12px;
  border: none;
  background: linear-gradient(180deg, #ff9f0a, #ff7a00);
  color: white;
  font-weight: 600;
  font-family: 'SF Pro Display', sans-serif;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(255,159,10,0.35);
}

.loader {
  margin: 16px auto 0;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 4px solid #e5e5ea;
  border-top: 4px solid #0a84ff;
  animation: spin 0.8s linear infinite;
  display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }

#results { max-width: 420px; margin: 0 auto; }

.result-card {
  background: #fff;
  border-radius: 22px;
  padding: 14px;
  margin-bottom: 26px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

.result-card img {
  width: 100%;
  border-radius: 14px;
  display: block;
  margin-bottom: 10px;
}

.download-btn {
  width: 100%;
  padding: 12px 0;
  border-radius: 12px;
  border: none;
  background: linear-gradient(180deg, #34c759, #28a745);
  color: white;
  font-weight: 600;
  font-family: 'SF Pro Display', sans-serif;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(52,199,89,0.35);
}
</style>
</head>

<body>

<div class="card">
  <h2>zklln IMEI Maker</h2>
  <textarea id="bulkInput" inputmode="numeric" placeholder="IMEI1&#10;IMEI2&#10;IMEI3&#10;IMEI4"></textarea>
  <button class="generate" onclick="generateBulk()">Generate</button>
  <div class="loader" id="loader"></div>
</div>

<div class="card" id="statusCard"></div>
<div id="results"></div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const baseImage = new Image();
baseImage.src = "template.png";

const canvas = document.getElementById("canvas");
const input = document.getElementById("bulkInput");
let generatedImages = [];

baseImage.onload = () => {
  canvas.width = baseImage.width;
  canvas.height = baseImage.height;
};

input.addEventListener("input", () => {
  input.value = input.value.replace(/[^0-9\n]/g, '');
});

async function loadFonts() {
  await document.fonts.load("500 31px 'SF Pro Display'");
}

const randomEID = () => Array.from({length:32}, () => Math.floor(Math.random()*10)).join('');
const randomDeviceID = () => Array.from({length:14}, () => Math.floor(Math.random()*10)).join('');

function drawTextBlock(ctx, text, x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

function downloadAll() {
  generatedImages.forEach((dataURL, i) => {
    const a = document.createElement("a");
    a.href = dataURL;
    a.download = `barcode_${i+1}.png`;
    a.click();
  });
}

async function generateBulk() {
  await loadFonts();

  const loader = document.getElementById("loader");
  const statusCard = document.getElementById("statusCard");
  const resultsDiv = document.getElementById("results");

  loader.style.display = "block";
  statusCard.style.display = "none";
  resultsDiv.innerHTML = "";
  generatedImages = [];

  setTimeout(() => {
    const lines = input.value.split("\n").map(l => l.trim()).filter(Boolean);
    if (lines.length < 2) {
      loader.style.display = "none";
      alert("Enter at least 2 IMEI numbers");
      return;
    }

    const ctx = canvas.getContext("2d");
    let barcodeCount = 0;

    for (let i = 0; i < lines.length; i += 2) {
      const imei1 = lines[i];
      const imei2 = lines[i+1];
      if (!imei2) break;

      const eid = randomEID();
      const deviceID = randomDeviceID();

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(baseImage, 0, 0);

      ctx.fillStyle = "#3a3a3c";
      ctx.font = "500 31px 'SF Pro Display'";
      ctx.textBaseline = "top";

      ctx.setTransform(0.97, 0, 0, 1, 0, 0); // Safari fix

      drawTextBlock(ctx, eid, 117, 382.8);
      drawTextBlock(ctx, imei1, 288, 675.5);
      drawTextBlock(ctx, imei2, 288, 960.5);
      drawTextBlock(ctx, deviceID, 297, 1250.5);

      ctx.setTransform(1, 0, 0, 1, 0, 0);

      const dataURL = canvas.toDataURL("image/png");
      generatedImages.push(dataURL);

      const card = document.createElement("div");
      card.className = "result-card";

      const img = document.createElement("img");
      img.src = dataURL;

      const btn = document.createElement("button");
      btn.className = "download-btn";
      btn.textContent = "Download";
      btn.onclick = () => {
        const a = document.createElement("a");
        a.href = dataURL;
        a.download = `barcode_${barcodeCount+1}.png`;
        a.click();
      };

      card.appendChild(img);
      card.appendChild(btn);
      resultsDiv.appendChild(card);

      barcodeCount++;
    }

    loader.style.display = "none";
    statusCard.style.display = "block";
    statusCard.innerHTML = `
      Successfully generated ${barcodeCount} barcode(s) from ${lines.length} IMEI numbers.
      <button class="download-all-btn" onclick="downloadAll()">Download All</button>
    `;

  }, 200);
}
</script>

</body>
</html>
