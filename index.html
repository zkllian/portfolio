<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Generator Barcode</title>

<style>
@font-face {
  font-family: 'SF Pro Custom';
  src: url('SF-Pro-Display-Regular.otf') format('opentype');
  font-weight: 400;
}
@font-face {
  font-family: 'SF Pro Custom';
  src: url('SF-Pro-Display-Medium.otf') format('opentype');
  font-weight: 500;
}

body {
  margin: 0;
  padding: 30px 0 120px;
  background: #f2f2f7;
  font-family: 'SF Pro Custom', -apple-system, BlinkMacSystemFont, sans-serif;
}

.app-wrap{ max-width:420px; margin:0 auto; padding:0 14px; box-sizing:border-box; }

.glass-shell{
  padding:10px;
  border-radius:22px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(30px) saturate(160%);
  box-shadow:0 8px 30px rgba(0,0,0,0.08), inset 0 1px 1px rgba(255,255,255,0.7);
  margin-bottom:22px;
}

.window,.result-window{
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(30px);
  border-radius:16px;
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:0 10px 35px rgba(0,0,0,0.06);
  position:relative;
  padding:54px 14px 20px;
  box-sizing:border-box;
}

.window-header{
  position:absolute; top:0; left:0; right:0;
  height:34px; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:500;
  background:linear-gradient(to bottom,#f9f9f9,#e9e9e9);
  border-bottom:1px solid rgba(0,0,0,0.08);
  border-top-left-radius:16px; border-top-right-radius:16px;
}

.window-dots{ position:absolute; left:12px; display:flex; gap:7px; }
.dot{ width:12px; height:12px; border-radius:50%; }
.red{ background:#ff5f57; } .yellow{ background:#ffbd2e; } .green{ background:#28c840; }

textarea{
  width:100%; height:160px; padding:14px; font-size:15px;
  border-radius:12px; border:1px solid #d2d2d7;
  resize:none; outline:none; box-sizing:border-box;
  font-family:'SF Pro Custom';
}

.info-box{
  font-size:12.5px;
  margin-top:8px;
  opacity:.7;
  line-height:1.4;
}

.tool-row{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.tool-btn{
  flex:1;
  font-size:12px;
  padding:8px 0;
  border-radius:10px;
  border:none;
  background:#e5e5ea;
  font-family:'SF Pro Custom';
}

.btn{
  width:100%; padding:13px 0; margin-top:14px;
  font-size:15px; border-radius:12px; border:none;
  font-weight:500; cursor:pointer;
  font-family:'SF Pro Custom';
}

.generate{ background:linear-gradient(#4da3ff,#0a84ff); color:white; }
.generate:disabled{ opacity:.6; }

.reset{ display:none; background:#ff3b30; color:white; }

.result-window img{ width:100%; border-radius:12px; display:block; margin-top:10px;}
</style>
</head>

<body>

<div class="app-wrap">
  <div class="glass-shell">
    <div class="window">
      <div class="window-header">
        <div class="window-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        Generator Barcode
      </div>

      <textarea id="bulkInput" placeholder="Satu IMEI (15 digit) per baris"></textarea>

      <div class="tool-row">
        <button class="tool-btn" onclick="pasteIMEI()">📋 Paste</button>
        <button class="tool-btn" onclick="sortIMEI()">🔢 Sort</button>
        <button class="tool-btn" onclick="removeDuplicates()">🧹 Unique</button>
      </div>

      <div class="info-box" id="infoBox">
        Total IMEI: 0<br>Valid: 0<br>Pairs: 0
      </div>

      <button id="generateBtn" class="btn generate" onclick="generateBulk()">Generate</button>
      <button id="resetBtn" class="btn reset" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const input=document.getElementById("bulkInput");
const infoBox=document.getElementById("infoBox");
const generateBtn=document.getElementById("generateBtn");
const resetBtn=document.getElementById("resetBtn");
const resultsDiv=document.getElementById("results");

function updateInfo(){
  const lines=input.value.split("\n").filter(l=>l.trim());
  const valid=lines.filter(v=>v.length===15).length;
  infoBox.innerHTML=`Total IMEI: ${lines.length}<br>Valid: ${valid}<br>Pairs: ${Math.floor(valid/2)}`;
}

input.addEventListener("input",()=>{
  input.value=input.value.replace(/[^0-9\n]/g,'');
  updateInfo();
});

function pasteIMEI(){
  navigator.clipboard.readText().then(text=>{
    input.value=text.replace(/[^0-9\n]/g,'');
    updateInfo();
  });
}

function sortIMEI(){
  let arr=input.value.split("\n").filter(Boolean).sort();
  input.value=arr.join("\n");
  updateInfo();
}

function removeDuplicates(){
  let arr=[...new Set(input.value.split("\n").filter(Boolean))];
  input.value=arr.join("\n");
  updateInfo();
}

function resetAll(){
  input.value="";
  resultsDiv.innerHTML="";
  resetBtn.style.display="none";
  updateInfo();
}

function setLoading(state,text){
  generateBtn.disabled=state;
  generateBtn.textContent=text||"Generate";
}

function randomDigits(len){
  return Array.from({length:len},()=>Math.floor(Math.random()*10)).join('');
}

async function generateBulk(){
  const lines=input.value.split("\n").filter(l=>l.trim());
  if(lines.length<2) return alert("Minimal 2 IMEI diperlukan");

  const totalPairs=Math.floor(lines.length/2);
  resultsDiv.innerHTML="";
  resetBtn.style.display="none";

  for(let i=0;i<totalPairs;i++){
    setLoading(true,`Generating ${i+1}/${totalPairs}`);
    await new Promise(r=>setTimeout(r,40));

    const div=document.createElement("div");
    div.className="glass-shell";
    div.innerHTML=`<div class="result-window"><img src="template.png"><div style="font-size:12px;margin-top:6px;">IMEI: ${lines[i*2]} & ${lines[i*2+1]}</div></div>`;
    resultsDiv.appendChild(div);
  }

  setLoading(false);
  resetBtn.style.display="block";
}
updateInfo();
</script>

</body>
</html>
