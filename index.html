<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Generator Barcode</title>

<style>
@font-face {
  font-family: 'SF Pro Custom';
  src: url('SF-Pro-Display-Regular.otf') format('opentype');
  font-weight: 400;
}
@font-face {
  font-family: 'SF Pro Custom';
  src: url('SF-Pro-Display-Medium.otf') format('opentype');
  font-weight: 500;
}

body {
  margin: 0;
  padding: 32px 0 40px; /* ✅ dibikin simetris & lebih rapih */
  background: #f2f2f7;
  font-family: 'SF Pro Custom', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.app-wrap{
  max-width: 420px;
  margin: 0 auto;
  padding: 0 14px;
  box-sizing: border-box;
}

.glass-shell{
  padding: 12px;
  border-radius: 26px;
  background: rgba(255,255,255,0.28);
  backdrop-filter: blur(30px) saturate(160%);
  -webkit-backdrop-filter: blur(30px) saturate(160%);
  box-shadow: 
    0 10px 40px rgba(0,0,0,0.10),
    inset 0 1px 1px rgba(255,255,255,0.7);
  margin-bottom: 26px;
}

/* POPUP */
.success-popup {
  position: fixed;
  top: 22px;
  left: 50%;
  transform: translateX(-50%) translateY(-10px) scale(.97);
  width: 80%;
  max-width: 400px;
  padding: 16px 18px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.18);
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.35);
  box-shadow: 0 8px 24px rgba(0,0,0,0.10);
  z-index: 9999;
  opacity: 0;
  transition: all .45s cubic-bezier(.2,.8,.2,1);
}
.success-popup.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
}
.success-popup h3 {
  margin: 0 0 4px;
  font-size: 15px;
  font-weight: 600;
}
.success-popup p {
  margin: 0;
  font-size: 13.5px;
  opacity: .85;
}

.window, .result-window {
  width: 100%;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(30px);
  border-radius: 18px;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 12px 30px rgba(0,0,0,0.06);
  position: relative;
  padding: 54px 14px 20px;
  box-sizing: border-box;
  margin-bottom: 22px;
}

.result-window{
  opacity: 0;
  transform: translateY(25px) scale(.98);
}
.result-window.show{
  animation: popIn .55s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes popIn{
  to{ opacity:1; transform: translateY(0) scale(1); }
}

.window-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  background: linear-gradient(to bottom,#f9f9f9,#ececec);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;
  color: #3c3c43;
}

.window-dots { position: absolute; left: 14px; display: flex; gap: 7px; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.red { background:#ff5f57; }
.yellow { background:#ffbd2e; }
.green { background:#28c840; }

textarea {
  width: 100%;
  height: 170px;
  padding: 14px;
  font-size: 15px;
  border-radius: 14px;
  border: 1px solid #d2d2d7;
  resize: none;
  outline: none;
  box-sizing: border-box;
  font-family: 'SF Pro Custom';
}

.btn {
  width: 100%;
  padding: 14px 0;
  margin-top: 14px;
  font-size: 15px;
  border-radius: 14px;
  border: none;
  font-weight: 500;
  cursor: pointer;
  font-family: 'SF Pro Custom';
}

.generate {
  background: linear-gradient(#4da3ff,#0a84ff);
  color: white;
  box-shadow: 0 6px 14px rgba(10,132,255,.25);
}
.generate:disabled{
  opacity:.6;
  box-shadow:none;
}

.reset { display:none; }

.action-row{ display:flex; gap:10px; margin-top:14px; }
.download-btn{ flex:1; background:#e5e5ea; }
.share-btn{ flex:1; background:#34c759; color:white; }

.result-window img { width:100%; border-radius:12px; display:block; }
</style>
</head>

<body>

<div class="success-popup" id="successPopup">
  <h3>Generate Berhasil</h3>
  <p id="successText"></p>
</div>

<div class="app-wrap">
  <div class="glass-shell">
    <div class="window">
      <div class="window-header">
        <div class="window-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        Generator Barcode
      </div>

      <textarea id="bulkInput" inputmode="numeric" placeholder="Satu IMEI (15 digit) per baris"></textarea>
      <button id="generateBtn" class="btn generate" onclick="generateBulk()">Generate</button>
      <button id="resetBtn" class="btn reset" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const baseImage = new Image();
baseImage.src = "template.png";

const canvas = document.getElementById("canvas");
const input = document.getElementById("bulkInput");
const resetBtn = document.getElementById("resetBtn");
const resultsDiv = document.getElementById("results");
const popup = document.getElementById("successPopup");
const popupText = document.getElementById("successText");
const generateBtn = document.getElementById("generateBtn");

baseImage.onload = () => {
  canvas.width = baseImage.width;
  canvas.height = baseImage.height;
};

input.addEventListener("input", () => {
  input.value = input.value.replace(/[^0-9\n]/g,'');
});

function setLoading(state,text){
  generateBtn.disabled = state;
  generateBtn.textContent = text || "Generate";
}

function showSuccess(totalImeis, totalBarcodes){
  popupText.innerText = `${totalImeis} IMEI diproses • ${totalBarcodes} barcode dibuat`;
  popup.classList.add("show");
  setTimeout(()=> popup.classList.remove("show"), 4200);
}

function resetAll(){
  input.value="";
  resultsDiv.innerHTML="";
  resetBtn.style.display="none";
}

function randomDigits(len){
  return Array.from({length:len},()=>Math.floor(Math.random()*10)).join('');
}

function downloadImage(dataUrl, index){
  const a=document.createElement("a");
  a.href=dataUrl;
  a.download=`barcode-${index}.png`;
  a.click();
}

async function shareImage(dataUrl, index){
  if(!navigator.share) return alert("Browser tidak mendukung fitur share");
  try{
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const file = new File([blob], `barcode-${index}.png`, {type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({ files:[file], title:`Barcode ${index}` });
    }
  }catch(err){}
}

async function generateBulk(){
  const lines=input.value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(lines.length < 2) return alert("Minimal 2 IMEI diperlukan");

  let kurang = lines.filter(v => v.length < 15);
  let lebih  = lines.filter(v => v.length > 15);
  if(kurang.length || lebih.length){
    let pesan="";
    if(kurang.length) pesan += "IMEI kurang dari 15 digit:\n"+kurang.join("\n")+"\n\n";
    if(lebih.length) pesan += "IMEI lebih dari 15 digit:\n"+lebih.join("\n");
    alert(pesan.trim());
    return;
  }

  const totalPairs = Math.floor(lines.length/2);
  setLoading(true,`Generating 1/${totalPairs}`);
  await new Promise(r=>setTimeout(r,100));

  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#000";
  ctx.textBaseline="top";
  ctx.font="400 31px 'SF Pro Custom'";

  resultsDiv.innerHTML="";
  let count=0;

  for(let i=0;i<lines.length;i+=2){
    if(!lines[i+1]) break;

    setLoading(true,`Generating ${count+1}/${totalPairs}`);
    await new Promise(r=>setTimeout(r,30));

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(baseImage,0,0);
    ctx.setTransform(0.97,0,0,1,0,0);

    ctx.fillText(randomDigits(32),117,377.8);
    ctx.fillText(lines[i],288,669.5);
    ctx.fillText(lines[i+1],288,954.5);
    ctx.fillText(randomDigits(14),297,1244.5);

    ctx.setTransform(1,0,0,1,0,0);

    const url=canvas.toDataURL("image/png");

    const div=document.createElement("div");
    div.className="result-window";

    div.innerHTML=`
      <div class="window-header">
        <div class="window-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        Barcode #${count+1}
      </div>
      <img src="${url}">
      <div class="action-row">
        <button class="btn download-btn" onclick="downloadImage('${url}', ${count+1})">Download</button>
        <button class="btn share-btn" onclick="shareImage('${url}', ${count+1})">Share</button>
      </div>
    `;

    resultsDiv.appendChild(div);
    requestAnimationFrame(()=> div.classList.add("show"));
    count++;
  }

  resetBtn.style.display="block";
  showSuccess(lines.length, count);
  setLoading(false,"Generate");
}
</script>

</body>
</html>
