<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zklln IMEI Maker</title>

<style>
@font-face {
  font-family: 'SF Pro Display';
  src: url('SF-Pro-Display-Medium.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
}

body {
  margin: 0;
  padding: 20px 16px 40px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  text-align: center;
  background: #f2f2f7;
}

textarea {
  width: 100%;
  max-width: 360px;
  height: 180px;
  padding: 14px 16px;
  font-size: 16px;
  line-height: 1.5;
  border-radius: 14px;
  border: 1px solid #d1d1d6;
  box-sizing: border-box;
  resize: none;
  outline: none;
  display: block;
  margin: 0 auto;
  background: #fff;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #007aff;
  color: white;
  cursor: pointer;
}

#results {
  width: 100%;
  max-width: 420px;
  margin: 30px auto 0;
}

.result-card {
  background: #fff;
  border-radius: 22px;
  padding: 14px;
  margin-bottom: 28px;
}

.result-title {
  font-weight: 600;
  font-size: 18px;
  margin-bottom: 12px;
}

.result-card img {
  width: 100%;
  height: auto;
  border-radius: 14px;
  display: block;
}
</style>
</head>

<body>

<h2>zklln IMEI Maker</h2>

<textarea id="bulkInput" placeholder="IMEI1&#10;IMEI2&#10;IMEI3&#10;IMEI4&#10;IMEI5&#10;IMEI6&#10;IMEI7&#10;IMEI8&#10;IMEI9&#10;IMEI10"></textarea>
<br>
<button onclick="generateBulk()">Generate</button>

<canvas id="canvas" style="display:none;"></canvas>
<div id="results"></div>

<script>
const baseImage = new Image();
baseImage.src = "template.png";

baseImage.onload = function () {
  const canvas = document.getElementById("canvas");
  canvas.width = baseImage.width;
  canvas.height = baseImage.height;
};

async function loadFonts() {
  await document.fonts.load("500 31px 'SF Pro Display'");
}

// Demo 32-digit number
function randomEID() {
  let eid = "";
  for (let i = 0; i < 32; i++) eid += Math.floor(Math.random() * 10);
  return eid;
}

// Demo 14-digit number
function randomDeviceID() {
  let id = "";
  for (let i = 0; i < 14; i++) id += Math.floor(Math.random() * 10);
  return id;
}

function drawTightText(ctx, text, x, y, spacing = -0.5) {
  let currentX = x;
  for (let char of text) {
    ctx.fillText(char, currentX, y);
    currentX += ctx.measureText(char).width + spacing;
  }
}

async function generateBulk() {
  await loadFonts();

  const lines = document.getElementById("bulkInput").value
    .split("\n")
    .map(l => l.trim())
    .filter(l => l.length);

  if (lines.length < 2) return alert("Kosong🤦");

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  let pairIndex = 1;

  for (let i = 0; i < lines.length; i += 2) {
    const imei1 = lines[i];
    const imei2 = lines[i + 1];
    if (!imei2) break;

    const eid = randomEID();
    const deviceID = randomDeviceID();

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(baseImage, 0, 0);

    ctx.fillStyle = "#3a3a3c";
    ctx.font = "500 31px 'SF Pro Display'";
    ctx.textBaseline = "top";
    ctx.textAlign = "left";

    drawTightText(ctx, eid, 114, 382.8);
    drawTightText(ctx, imei1, 280, 675.5);
    drawTightText(ctx, imei2, 280, 960.5);
    drawTightText(ctx, deviceID, 288, 1250.5);

    const card = document.createElement("div");
    card.className = "result-card";

    const label = document.createElement("div");
    label.className = "result-title";
    label.textContent = "Pasangan " + pairIndex;

    const img = document.createElement("img");
    img.src = canvas.toDataURL("image/png");

    card.appendChild(label);
    card.appendChild(img);
    resultsDiv.appendChild(card);

    pairIndex++;
  }
}
</script>

</body>
</html>
