<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Generator Barcode</title>

<style>
@font-face {
  font-family: 'sf pro custom';
  src: url('SF-Pro-Display-Regular.otf') format('opentype');
  font-weight: 400;
}
@font-face {
  font-family: 'sf pro custom';
  src: url('SF-Pro-Display-Medium.otf') format('opentype');
  font-weight: 500;
}

body {
  margin: 0;
  padding: 30px 0 120px;
  background: #f2f2f7;
  font-family: 'sf pro custom', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 400;
}

/* SUCCESS POPUP */
.success-popup {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(25px);
  padding: 16px 22px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  border: 1px solid rgba(0,0,0,0.08);
  text-align: center;
  z-index: 9999;
  opacity: 0;
  transition: all .5s cubic-bezier(.2,.8,.2,1);
}
.success-popup.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.success-popup h3 { margin: 0 0 4px; font-size: 15px; font-weight: 500; }
.success-popup p { margin: 0; font-size: 13px; color: #3c3c43; }

/* LAYOUT */
.app-wrap{
  max-width: 420px;
  margin: 0 auto;
  padding: 0 14px;
  box-sizing: border-box;
}

.window {
  width: 100%;
  margin-bottom: 22px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(30px);
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 10px 35px rgba(0,0,0,0.08);
  position: relative;
  padding: 54px 14px 20px;
  box-sizing: border-box;
  transition: transform .2s ease;
}
.window:hover { transform: translateY(-2px); }

.window-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  font-family: 'sf pro custom';
  background: linear-gradient(to bottom,#f9f9f9,#e9e9e9);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  color: #3c3c43;
}

.window-dots {
  position: absolute;
  left: 12px;
  display: flex;
  gap: 7px;
}
.dot { width: 12px; height: 12px; border-radius: 50%; }
.red { background:#ff5f57; }
.yellow { background:#ffbd2e; }
.green { background:#28c840; }

textarea {
  width: 100%;
  height: 170px;
  padding: 14px;
  font-size: 15px;
  border-radius: 12px;
  border: 1px solid #d2d2d7;
  background: #ffffff;
  resize: none;
  outline: none;
  box-sizing: border-box;
  font-family: 'sf pro custom';
  font-weight: 400;
  line-height: 22px;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
}

.btn {
  width: 100%;
  padding: 12px 0;
  margin-top: 14px;
  font-size: 14px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.15);
  font-weight: 400;
  font-family: 'sf pro custom';
  cursor: pointer;
  transition: all .15s ease;
  background: #f2f2f7;
}

.generate {
  background: linear-gradient(#4da3ff,#0a84ff);
  border: 1px solid #0a84ff;
  color: white;
  box-shadow: 0 6px 14px rgba(10,132,255,.25);
}
.generate:hover { transform: scale(1.02); }

.reset { display:none; }

.result-window {
  width: 100%;
  margin-bottom: 22px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(30px);
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  position: relative;
  padding: 54px 14px 20px;
  box-sizing: border-box;
  animation: fadeIn .4s ease forwards;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

.result-window img {
  width:100%;
  border-radius:12px;
  display:block;
}

/* BUTTON ROW */
.action-row{
  display:flex;
  gap:10px;
  margin-top:14px;
}
.action-row .btn{
  margin-top:0;
  flex:1;
}
</style>
</head>

<body>

<div class="success-popup" id="successPopup">
  <h3>✅ Generate Berhasil</h3>
  <p id="successText"></p>
</div>

<div class="app-wrap">
  <div class="window">
    <div class="window-header">
      <div class="window-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      Generator Barcode
    </div>

    <textarea id="bulkInput" inputmode="numeric" placeholder="Satu IMEI (15 digit) per baris"></textarea>

    <button class="btn generate" onclick="generateBulk()">Generate</button>
    <button id="resetBtn" class="btn reset" onclick="resetAll()">Reset</button>
  </div>

  <div id="results"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const baseImage = new Image();
baseImage.src = "template.png";

const canvas = document.getElementById("canvas");
const input = document.getElementById("bulkInput");
const resetBtn = document.getElementById("resetBtn");
const resultsDiv = document.getElementById("results");
const popup = document.getElementById("successPopup");
const popupText = document.getElementById("successText");

baseImage.onload = () => {
  canvas.width = baseImage.width;
  canvas.height = baseImage.height;
};

input.addEventListener("input", () => {
  input.value = input.value.replace(/[^0-9\n]/g,'');
});

function showSuccess(totalImeis, totalBarcodes){
  popupText.innerText = `${totalImeis} IMEI diproses • ${totalBarcodes} barcode dibuat`;
  popup.classList.add("show");
  setTimeout(()=> popup.classList.remove("show"), 4000);
}

function resetAll(){
  input.value="";
  resultsDiv.innerHTML="";
  resetBtn.style.display="none";
}

function randomDigits(len){
  return Array.from({length:len},()=>Math.floor(Math.random()*10)).join('');
}

function downloadImage(dataUrl, index){
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = `barcode-${index}.png`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* SHARE ONLY (NO AUTO DOWNLOAD) */
async function shareImage(dataUrl, index){
  if(!navigator.share){
    alert("Browser tidak mendukung fitur share");
    return;
  }

  try{
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const file = new File([blob], `barcode-${index}.png`, {type:"image/png"});

    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        title:`Barcode ${index}`
      });
    } else {
      alert("Device tidak mendukung share file gambar");
    }

  }catch(e){
    alert("Gagal membuka menu share");
  }
}

function generateBulk(){
  const lines=input.value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(lines.length < 2) return alert("Minimal 2 IMEI diperlukan");

  let kurang = lines.filter(v => v.length < 15);
  let lebih  = lines.filter(v => v.length > 15);

  if(kurang.length || lebih.length){
    let pesan = "";
    if(kurang.length) pesan += "IMEI kurang dari 15 digit:\n" + kurang.join("\n") + "\n\n";
    if(lebih.length)  pesan += "IMEI lebih dari 15 digit:\n" + lebih.join("\n");
    alert(pesan.trim());
    return;
  }

  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#000";
  ctx.textBaseline="top";
  ctx.font="400 31px 'sf pro custom'";

  resultsDiv.innerHTML="";
  let count=0;

  for(let i=0;i<lines.length;i+=2){
    if(!lines[i+1]) break;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(baseImage,0,0);
    ctx.setTransform(0.97,0,0,1,0,0);

    ctx.fillText(randomDigits(32),117,377.8);
    ctx.fillText(lines[i],288,669.5);
    ctx.fillText(lines[i+1],288,954.5);
    ctx.fillText(randomDigits(14),297,1244.5);

    ctx.setTransform(1,0,0,1,0,0);

    const url=canvas.toDataURL("image/png");

    const div=document.createElement("div");
    div.className="result-window";
    div.innerHTML=`
      <div class="window-header">
        <div class="window-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        Barcode #${count+1}
      </div>
      <img src="${url}">
      <div class="action-row">
        <button class="btn" onclick="downloadImage('${url}', ${count+1})">Download</button>
        <button class="btn" onclick="shareImage('${url}', ${count+1})">Share</button>
      </div>
    `;
    resultsDiv.appendChild(div);
    count++;
  }

  resetBtn.style.display="block";
  showSuccess(lines.length, count);

  if(count > 0){
    resultsDiv.lastElementChild.scrollIntoView({behavior:"smooth"});
  }
}
</script>

</body>
</html>
