<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zklln IMEI Maker</title>

<style>
@font-face {
  font-family: 'SF Pro Display';
  src: url('SF-Pro-Display-Medium.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
}

body {
  margin: 0;
  padding: 24px 16px 50px;
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  text-align: center;
}

.app {
  max-width: 420px;
  margin: auto;
  background: #ffffff;
  border-radius: 28px;
  padding: 22px 18px 26px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

h2 {
  margin-top: 6px;
  margin-bottom: 18px;
}

textarea {
  width: 100%;
  height: 170px;
  padding: 16px;
  font-size: 17px;
  border-radius: 18px;
  border: 1px solid #d1d1d6;
  box-sizing: border-box;
  resize: none;
  outline: none;
  background: #fff;
  font-family: 'SF Pro Display', sans-serif;
}

button {
  margin-top: 18px;
  width: 100%;
  padding: 14px 0;
  font-size: 17px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(180deg, #0a84ff, #0066ff);
  color: white;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0,122,255,0.35);
}

button:active {
  transform: scale(0.98);
}

#status {
  margin-top: 14px;
  font-size: 15px;
  color: #34c759;
  font-weight: 500;
  min-height: 22px;
}

.loader {
  margin: 16px auto 0;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 4px solid #e5e5ea;
  border-top: 4px solid #0a84ff;
  animation: spin 0.8s linear infinite;
  display: none;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#results {
  margin-top: 26px;
}

.result-card {
  background: #fff;
  border-radius: 22px;
  padding: 14px;
  margin-bottom: 26px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

.result-card img {
  width: 100%;
  border-radius: 14px;
  display: block;
  margin-bottom: 10px;
}

.download-btn {
  width: 100%;
  padding: 10px 0;
  border-radius: 10px;
  border: none;
  background: #34c759;
  color: white;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="app">
  <h2>zklln IMEI Maker</h2>

  <textarea id="bulkInput" placeholder="IMEI1&#10;IMEI2&#10;IMEI3&#10;IMEI4"></textarea>

  <button onclick="generateBulk()">Generate Barcodes</button>
  <div class="loader" id="loader"></div>
  <div id="status"></div>

  <canvas id="canvas" style="display:none;"></canvas>
  <div id="results"></div>
</div>

<script>
const baseImage = new Image();
baseImage.src = "template.png";

baseImage.onload = function () {
  const canvas = document.getElementById("canvas");
  canvas.width = baseImage.width;
  canvas.height = baseImage.height;
};

document.getElementById("bulkInput").addEventListener("input", function () {
  this.value = this.value.replace(/[^0-9\n]/g, '');
});

async function loadFonts() {
  await document.fonts.load("500 31px 'SF Pro Display'");
}

function randomEID() {
  let eid = "";
  for (let i = 0; i < 32; i++) eid += Math.floor(Math.random() * 10);
  return eid;
}

function randomDeviceID() {
  let id = "";
  for (let i = 0; i < 14; i++) id += Math.floor(Math.random() * 10);
  return id;
}

function drawTightText(ctx, text, x, y, spacing = -0.5) {
  let currentX = x;
  for (let char of text) {
    ctx.fillText(char, currentX, y);
    currentX += ctx.measureText(char).width + spacing;
  }
}

async function generateBulk() {
  await loadFonts();

  const loader = document.getElementById("loader");
  const status = document.getElementById("status");
  loader.style.display = "block";
  status.textContent = "";

  setTimeout(() => {
    const lines = document.getElementById("bulkInput").value
      .split("\n")
      .map(l => l.trim())
      .filter(l => l.length);

    if (lines.length < 2) {
      loader.style.display = "none";
      alert("Enter at least 2 IMEI numbers");
      return;
    }

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    let barcodeCount = 0;

    for (let i = 0; i < lines.length; i += 2) {
      const imei1 = lines[i];
      const imei2 = lines[i + 1];
      if (!imei2) break;

      const eid = randomEID();
      const deviceID = randomDeviceID();

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(baseImage, 0, 0);

      ctx.fillStyle = "#3a3a3c";
      ctx.font = "500 31px 'SF Pro Display'";
      ctx.textBaseline = "top";
      ctx.textAlign = "left";

      drawTightText(ctx, eid, 114, 382.8);
      drawTightText(ctx, imei1, 280, 675.5);
      drawTightText(ctx, imei2, 280, 960.5);
      drawTightText(ctx, deviceID, 288, 1250.5);

      const card = document.createElement("div");
      card.className = "result-card";

      const img = document.createElement("img");
      const dataURL = canvas.toDataURL("image/png");
      img.src = dataURL;

      const downloadBtn = document.createElement("button");
      downloadBtn.className = "download-btn";
      downloadBtn.textContent = "Download";
      downloadBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = dataURL;
        a.download = "barcode_" + (barcodeCount + 1) + ".png";
        a.click();
      };

      card.appendChild(img);
      card.appendChild(downloadBtn);
      resultsDiv.appendChild(card);

      barcodeCount++;
    }

    loader.style.display = "none";
    status.textContent = `Successfully generated ${barcodeCount} barcode(s) from ${lines.length} IMEI numbers.`;

  }, 300);
}
</script>

</body>
</html>
