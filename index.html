<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Generator Barcode</title>

<style>
@font-face {
  font-family: 'SF Pro Custom';
  src: url('SF-Pro-Display-Regular.otf') format('opentype');
  font-weight: 400;
}
@font-face {
  font-family: 'SF Pro Custom';
  src: url('SF-Pro-Display-Medium.otf') format('opentype');
  font-weight: 500;
}

:root{
  --bg:#f2f2f7;
  --card:rgba(255,255,255,0.9);
  --text:#000;
  --accent:#0a84ff;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#111214;
    --card:rgba(28,28,30,0.85);
    --text:#fff;
  }
}

body {
  margin: 0;
  padding: 30px 0 120px;
  background: var(--bg);
  font-family: 'SF Pro Custom', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text);
}

.app-wrap{
  max-width: 420px;
  margin: 0 auto;
  padding: 0 14px;
  box-sizing: border-box;
}

/* SUCCESS POPUP */
.success-popup {
  position: fixed;
  top: 22px;
  left: 50%;
  transform: translateX(-50%) translateY(-10px) scale(.96);
  width: 88%;
  max-width: 400px;
  padding: 16px 18px;
  border-radius: 20px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(28px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.35);
  box-shadow: 0 8px 24px rgba(0,0,0,0.10);
  z-index: 9999;
  opacity: 0;
  transition: all .5s cubic-bezier(.2,.8,.2,1);
}
.success-popup.show { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
.success-popup h3 { margin:0 0 4px; font-size:15px; font-weight:600; }
.success-popup p { margin:0; font-size:13.5px; opacity:.85; }

/* WINDOWS */
.window, .result-window {
  width: 100%;
  margin-bottom: 22px;
  background: var(--card);
  backdrop-filter: blur(30px);
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 10px 35px rgba(0,0,0,0.06);
  position: relative;
  padding: 54px 14px 20px;
  box-sizing: border-box;
  opacity: 0;
  transform: translateY(10px) scale(.97);
  transition: all .5s cubic-bezier(.2,.8,.2,1);
}
.result-window.show { opacity:1; transform: translateY(0) scale(1); }

.window-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  background: linear-gradient(to bottom,#f9f9f9,#e9e9e9);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  color: #3c3c43;
}

.window-dots { position:absolute; left:12px; display:flex; gap:7px; }
.dot{width:12px;height:12px;border-radius:50%;}
.red{background:#ff5f57;} .yellow{background:#ffbd2e;} .green{background:#28c840;}

textarea {
  width: 100%;
  height: 170px;
  padding: 14px;
  font-size: 15px;
  border-radius: 12px;
  border: 1px solid #d2d2d7;
  resize: none;
  font-family: 'SF Pro Custom';
}

.info-text{ font-size:12.5px; margin-top:8px; opacity:.7; }

.btn {
  width: 100%;
  padding: 13px 0;
  margin-top: 14px;
  font-size: 15px;
  border-radius: 12px;
  border: none;
  font-weight: 500;
  cursor: pointer;
  font-family: 'SF Pro Custom';
}

.generate { background: linear-gradient(#4da3ff,#0a84ff); color:white; }
.generate:disabled{opacity:.6;cursor:not-allowed;}

.download-all { background:#e5e5ea; margin-bottom:10px; }

.action-row{ display:flex; gap:10px; margin-top:14px; }
.download-btn{ flex:1; background:#e5e5ea; }
.share-btn{ flex:1; background:#34c759; color:white; }

.copy-btn{ margin-top:10px; background:#d1d1d6; font-size:13px; padding:10px 0; border-radius:10px;}
.delete-btn{ margin-top:8px; background:#ff3b30; color:white; font-size:12px; padding:8px 0; border-radius:8px;}

.result-window img { width:100%; border-radius:12px; display:block; }

/* PROGRESS BAR */
.progress-wrap{
  height:6px;
  width:100%;
  background:#d1d1d6;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
  display:none;
}
.progress-bar{
  height:100%;
  width:0%;
  background:var(--accent);
  transition:width .3s ease;
}

/* QUALITY TOGGLE */
.quality-select{
  margin-top:10px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="success-popup" id="successPopup">
  <h3>Generate Berhasil</h3>
  <p id="successText"></p>
</div>

<div class="app-wrap">
  <div class="window show">
    <div class="window-header">
      <div class="window-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      Generator Barcode
    </div>

    <textarea id="bulkInput" placeholder="Satu IMEI (15 digit) per baris"></textarea>
    <div class="info-text" id="imeiInfo">0 IMEI terdeteksi</div>

    <div class="quality-select">
      Kualitas Gambar:
      <select id="quality">
        <option value="1">Standard</option>
        <option value="2">HD</option>
      </select>
    </div>

    <button id="generateBtn" class="btn generate" onclick="generateBulk()">Generate</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <button id="downloadAllBtn" class="btn download-all" style="display:none;" onclick="downloadAll()">⬇ Download Semua</button>
  </div>

  <div id="results"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const baseImage = new Image();
baseImage.src = "template.png";

const canvas = document.getElementById("canvas");
const input = document.getElementById("bulkInput");
const resultsDiv = document.getElementById("results");
const popup = document.getElementById("successPopup");
const popupText = document.getElementById("successText");
const generateBtn = document.getElementById("generateBtn");
const imeiInfo = document.getElementById("imeiInfo");
const downloadAllBtn = document.getElementById("downloadAllBtn");
const progressWrap = document.getElementById("progressWrap");
const progressBar = document.getElementById("progressBar");
const qualitySelect = document.getElementById("quality");

let generatedImages = [];

input.addEventListener("input", ()=>{
  input.value = input.value.replace(/[^0-9\n]/g,'');
  const lines = input.value.split("\n").filter(l=>l.trim());
  const valid = lines.filter(v=>v.length===15).length;
  imeiInfo.textContent = `${lines.length} IMEI terdeteksi • Valid: ${valid}`;
});

function showSuccess(totalImeis, totalBarcodes){
  popupText.innerText = `${totalImeis} IMEI diproses • ${totalBarcodes} barcode dibuat`;
  popup.classList.add("show");
  setTimeout(()=> popup.classList.remove("show"), 4200);
}

function randomDigits(len){
  return Array.from({length:len},()=>Math.floor(Math.random()*10)).join('');
}

function downloadImage(dataUrl, index){
  const a=document.createElement("a");
  a.href=dataUrl;
  a.download=`barcode-${index}.png`;
  a.click();
}

function downloadAll(){
  generatedImages.forEach((url,i)=> downloadImage(url,i+1));
}

function copyText(text){ navigator.clipboard.writeText(text); }

function deleteCard(btn){
  btn.closest(".result-window").remove();
}

async function generateBulk(){
  const lines=input.value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(lines.length < 2) return alert("Minimal 2 IMEI diperlukan");

  generateBtn.disabled = true;
  generateBtn.textContent = "Generating...";
  progressWrap.style.display="block";
  resultsDiv.innerHTML="";
  generatedImages=[];
  downloadAllBtn.style.display="none";

  const scale = parseInt(qualitySelect.value);
  canvas.width = baseImage.width * scale;
  canvas.height = baseImage.height * scale;

  const ctx=canvas.getContext("2d");
  ctx.scale(scale,scale);
  ctx.font="400 31px 'SF Pro Custom'";

  let count=0;
  const totalPairs = Math.floor(lines.length/2);

  for(let i=0;i<lines.length;i+=2){
    if(!lines[i+1]) break;

    generateBtn.textContent = `Generating ${count+1}/${totalPairs}`;
    progressBar.style.width = ((count+1)/totalPairs)*100 + "%";

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(baseImage,0,0);

    ctx.fillText(randomDigits(32),117,377.8);
    ctx.fillText(lines[i],288,669.5);
    ctx.fillText(lines[i+1],288,954.5);
    ctx.fillText(randomDigits(14),297,1244.5);

    const url=canvas.toDataURL("image/png");
    generatedImages.push(url);

    const div=document.createElement("div");
    div.className="result-window";
    div.innerHTML=`
      <div class="window-header">
        <div class="window-dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        Barcode #${count+1} • Pair ${count+1}/${totalPairs}
      </div>
      <img src="${url}">
      <div class="action-row">
        <button class="btn download-btn" onclick="downloadImage('${url}', ${count+1})">Download</button>
        <button class="btn share-btn" onclick="navigator.share && navigator.share({url:'${url}'})">Share</button>
      </div>
      <button class="copy-btn" onclick="copyText('${lines[i]} , ${lines[i+1]}')">📋 Copy IMEI Pair</button>
      <button class="delete-btn" onclick="deleteCard(this)">🗑 Hapus</button>
    `;
    resultsDiv.appendChild(div);
    setTimeout(()=> div.classList.add("show"), 80 * count);

    count++;
    await new Promise(r=>setTimeout(r,60));
  }

  generateBtn.disabled = false;
  generateBtn.textContent = "Generate";
  progressWrap.style.display="none";
  progressBar.style.width="0%";
  downloadAllBtn.style.display="block";
  showSuccess(lines.length, count);
}
</script>

</body>
</html>
